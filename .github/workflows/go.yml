name: lint-test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Run Build (Makefile)
        run: make build

  install:
    name: Check install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Go Install
        run: go install .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile') }}-lint
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Run Lint (Makefile)
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile') }}-test
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Run Test (Makefile)
        run: make test
