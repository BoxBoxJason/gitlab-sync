name: Validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Run Build (Makefile)
        run: make build

  install:
    name: Check install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Go Install
        run: go install .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile') }}-lint
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Run Lint (Makefile)
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile') }}-test
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Run Test (Makefile)
        run: make test

  oci:
    name: Build OCI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OCI Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: false
          sbom: true
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.url=ghcr.io/boxboxjason/gitlab-sync
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.vendor=${{ github.repository_owner}}
