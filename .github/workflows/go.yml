name: lint-test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - run: go mod download
      - run: go install gotest.tools/gotestsum@v1.13.0
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: build
        run: make build

      - name: Verify go install
        run: go install .

      - name: Lint
        run: make lint

      - name: Unit-Test
        run: make test
